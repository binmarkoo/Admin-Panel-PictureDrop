<div class="container">
  <div class="header">
    <div class="dropdown">
      <button class="dropdown-btn">☰</button>
      <div class="dropdown-content">
        <a href="#">Arbeitsbereich 1</a>
        <a href="#">Arbeitsbereich 2</a>
        <a href="#">Arbeitsbereich 3</a>
        <!-- Weitere Arbeitsbereiche können hier hinzugefügt werden -->
      </div>
    </div>
    <h1 id="current-arbeitsbereich">Arbeitsbereich 1</h1>
  </div>

  <div class="chart-container">
    <div class="chart-header">
      <h2>Jahresübersicht</h2>
      <select class="year-selector" id="year-selector">
        <option value="2024">2024</option>
        <option value="2023">2023</option>
        <option value="2022">2022</option>
      </select>
    </div>

    <div class="chart-wrapper">
      <canvas id="yearChart"></canvas>
    </div>
  </div>

  <table class="data-table">
    <thead>
      <tr>
        <th>Monat</th>
        <th>Wert</th>
        <th>Referenz</th>
      </tr>
    </thead>
    <tbody id="data-table-body">
      <!-- Daten werden dynamisch eingefügt -->
    </tbody>
  </table>
</div>
