<app-navbar></app-navbar>

<div class="container">
  <div class="header">
    <div class="dropdown">
      <button class="dropdown-btn">☰</button>
      <div class="dropdown-content">
        <a *ngFor="let bereich of arbeitsbereiche" href="#"
          (click)="selectArbeitsbereich(bereich); $event.preventDefault()">
          {{ bereich }}
        </a>
      </div>
    </div>
    <h1 id="current-arbeitsbereich">{{ currentArbeitsbereich }}</h1>
  </div>

  <div class="chart-container">
    <div class="chart-header">
      <h2>Jahresübersicht</h2>
      <select class="year-selector" [(ngModel)]="selectedYear" (change)="changeYear(selectedYear)">
        <option value="2024">2024</option>
        <option value="2023">2023</option>
        <option value="2022">2022</option>
      </select>
    </div>

    <div class="chart-wrapper">
      <canvas id="yearChart"></canvas>
    </div>
  </div>

  <table class="data-table">
    <thead>
      <tr>
        <th>Monat</th>
        <th>Wert</th>
        <th>Referenz</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let month of chartData[selectedYear].labels; let i = index">
        <td>{{ month }}</td>
        <td>{{ chartData[selectedYear].values[i] }}</td>
        <td>{{ chartData[selectedYear].references[i] }}</td>
      </tr>
    </tbody>
  </table>
</div>
